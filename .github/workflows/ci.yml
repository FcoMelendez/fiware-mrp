name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Tutorial tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON schemas
        run: make lint-schemas

      - name: Start stack
        run: make start

      - name: Wait for Orion-LD
        run: ./scripts/wait-for-orion.sh

      - name: Load seed data (Tutorial 01)
        run: make seed TUTORIAL=01

      - name: Run Tutorial 01 tests
        run: make test-01

      - name: Dump logs on failure
        if: failure()
        run: make logs-ci

      - name: Stop stack
        if: always()
        run: make stop
